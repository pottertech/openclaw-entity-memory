version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: openclaw-entity-memory-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openclaw_entity_memory
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - openclaw_entity_memory_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d openclaw_entity_memory"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  openclaw_entity_memory_pg: